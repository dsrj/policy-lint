name: Firewall Policy Lint

on: [push, pull_request]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build Provider
        run: |
          go version
          go mod tidy

          rm -f terraform-provider-fw-analyzer

          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o terraform-provider-fw-analyzer

          chmod +x terraform-provider-fw-analyzer

          file terraform-provider-fw-analyzer
          ldd terraform-provider-fw-analyzer || true

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Create Global CLI Config
        run: |
          cat <<EOF > $HOME/.terraformrc
          provider_installation {
            dev_overrides {
              "local/fw-analyzer" = "$GITHUB_WORKSPACE"
            }
            direct {}
          }
          EOF

      - name: Terraform Init
        run: |
          export TF_CLI_CONFIG_FILE=$HOME/.terraformrc
          terraform init -no-color

      - name: Terraform Plan (Lint)
        run: |
          export TF_CLI_CONFIG_FILE=$HOME/.terraformrc
          terraform plan -no-color -detailed-exitcode || \
          if [ $? -eq 2 ]; then exit 0; else exit 1; fi