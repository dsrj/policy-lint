name: Firewall Policy Lint

on: [push, pull_request]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Force Rebuild Module and Binary
        run: |
          # 1. Clean existing module files to prevent parsing errors
          rm -f go.mod go.sum
          
          # 2. Re-initialize and fetch dependencies via CLI
          go mod init terraform-provider-fw-analyzer
          go get ://github.com
          go mod tidy
          
          # 3. Build the binary
          go build -o terraform-provider-fw-analyzer
          chmod +x terraform-provider-fw-analyzer

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Create Global CLI Config
        run: |
          # Use absolute path to GITHUB_WORKSPACE to avoid '~' expansion issues
          cat <<EOF > $HOME/.terraformrc
          provider_installation {
            dev_overrides {
              "local/fw-analyzer" = "$GITHUB_WORKSPACE"
            }
            direct {}
          }
          EOF

      - name: Terraform Plan (Lint)
        run: |
          # Explicitly point to the config file and run plan
          export TF_CLI_CONFIG_FILE=$HOME/.terraformrc
          
          # We use -detailed-exitcode: 
          # 0=no changes, 2=changes (normal for data source), 1=error
          terraform plan -no-color
